apiVersion: 1

datasources:
  - name: GeoGuessr PostgreSQL
    type: postgres
    uid: geoguessr-postgres
    access: proxy
    # 'postgres' is the docker compose service name (resolves within the compose network)
    url: postgres:5432
    user: geoguessr
    jsonData:
      database: geoguessr
      sslmode: disable
      maxOpenConns: 10
      maxIdleConns: 5
      connMaxLifetime: 14400
      postgresVersion: 1600
    secureJsonData:
      password: geoguessr
    isDefault: true
    editable: true
