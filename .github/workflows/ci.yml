name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run unit tests
        run: |
          python -m pytest tests/test_pg_push.py tests/test_exports.py -v

  integration-tests:
    name: Integration Tests (Docker)
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Verify Docker Compose
        run: docker compose version

      - name: Run integration tests
        run: |
          python -m pytest tests/test_integration.py -v --timeout=120
        timeout-minutes: 5

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check JSON validity
        run: |
          python -c "import json; json.load(open('grafana/dashboards/overview.json'))"
          python -c "import json; json.load(open('config.json.example'))"

      - name: Check YAML validity
        run: |
          python -c "
          import yaml
          with open('docker-compose.yml') as f: yaml.safe_load(f)
          with open('grafana/provisioning/datasources/datasource.yml') as f: yaml.safe_load(f)
          with open('grafana/provisioning/dashboards/dashboards.yml') as f: yaml.safe_load(f)
          " 2>/dev/null || echo "PyYAML not available, skipping YAML validation"

      - name: Check Python syntax
        run: |
          python -m py_compile geoguessr_dashboard.py
          python -m py_compile pg_push.py
          python -m py_compile analyze_stats.py
          python -m py_compile country_codes.py
